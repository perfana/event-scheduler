---
name: Release to maven central

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set tag name
        run: |
          # Use the pushed tag name; fall back to VERSION file for workflow_dispatch
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "" ] || [ "$TAG" = "main" ]; then
            TAG=$(cat ./VERSION)
          fi
          echo "TAG_NAME=$TAG" >> $GITHUB_ENV
      - name: Switch to git tag for release
        if: contains(env.TAG_NAME, 'SNAPSHOT') != true
        run: |
          git fetch --all --tags
          git checkout tags/${{ env.TAG_NAME }} -b ${{ env.TAG_NAME }}-tmp-branch
      - name: Verify VERSION file matches tag
        if: contains(env.TAG_NAME, 'SNAPSHOT') != true
        run: |
          FILE_VERSION=$(cat ./VERSION)
          if [ "$FILE_VERSION" != "${{ env.TAG_NAME }}" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag (${{ env.TAG_NAME }})"
            exit 1
          fi
          echo "VERSION file and tag are in sync: $FILE_VERSION"
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'corretto'

      - name: Publish snapshot to Maven Central
        if: contains(env.TAG_NAME, 'SNAPSHOT') == true
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: ./gradlew --info clean publishToMavenCentral -Pversion=${{ env.TAG_NAME }}

      - name: Publish release to Maven Central
        if: contains(env.TAG_NAME, 'SNAPSHOT') != true
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: ./gradlew --info publishToMavenCentral -Pversion=${{ env.TAG_NAME }}

      - name: Create GHA release
        uses: ncipollo/release-action@v1
        if: contains(env.TAG_NAME, 'SNAPSHOT') != true
        with:
          artifacts: "build/libs/*.jar"
          bodyFile: RELEASE.md